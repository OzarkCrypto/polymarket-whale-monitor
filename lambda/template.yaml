AWSTemplateFormatVersion: '2010-09-09'
Description: 'Polymarket Whale Alert Bot - Lambda + EventBridge + DynamoDB + Telegram'

Parameters:
  TelegramBotToken:
    Type: String
    NoEcho: true
    Description: 'Telegram Bot Token from @BotFather'
  TelegramChatId:
    Type: String
    Description: 'Telegram Chat ID (use @userinfobot or getUpdates)'
  Threshold:
    Type: Number
    Default: 1000
    Description: 'Minimum trade value in USD to trigger alert'
  EventSlug:
    Type: String
    Default: 'us-x-iran-ceasefire-by'
    Description: 'Polymarket event slug to monitor'

Resources:
  # ── DynamoDB Table ──────────────────────────────────────
  SeenTxTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: polymarket-whale-seen-tx
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: txHash
          AttributeType: S
      KeySchema:
        - AttributeName: txHash
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true

  # ── IAM Role ────────────────────────────────────────────
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: polymarket-whale-lambda-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: LambdaPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: 'arn:aws:logs:*:*:*'
              - Effect: Allow
                Action:
                  - dynamodb:BatchGetItem
                  - dynamodb:BatchWriteItem
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                Resource: !GetAtt SeenTxTable.Arn

  # ── Lambda Function ────────────────────────────────────
  WhaleAlertFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: polymarket-whale-alert
      Runtime: nodejs20.x
      Handler: index.handler
      Timeout: 55
      MemorySize: 128
      Role: !GetAtt LambdaExecutionRole.Arn
      Environment:
        Variables:
          TELEGRAM_BOT_TOKEN: !Ref TelegramBotToken
          TELEGRAM_CHAT_ID: !Ref TelegramChatId
          THRESHOLD: !Ref Threshold
          DYNAMODB_TABLE: !Ref SeenTxTable
          EVENT_SLUG: !Ref EventSlug
      Code:
        ZipFile: |
          // Placeholder — upload actual code via Console or CLI
          // See lambda/index.mjs
          export const handler = async () => ({ statusCode: 200 });

  # ── EventBridge Rule (every 1 minute) ──────────────────
  ScheduleRule:
    Type: AWS::Events::Rule
    Properties:
      Name: polymarket-whale-schedule
      Description: 'Trigger whale monitor every 1 minute'
      ScheduleExpression: 'rate(1 minute)'
      State: ENABLED
      Targets:
        - Arn: !GetAtt WhaleAlertFunction.Arn
          Id: WhaleAlertTarget

  # ── Permission for EventBridge to invoke Lambda ────────
  LambdaInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref WhaleAlertFunction
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt ScheduleRule.Arn

Outputs:
  LambdaFunctionArn:
    Description: 'Lambda function ARN'
    Value: !GetAtt WhaleAlertFunction.Arn
  DynamoDBTableName:
    Description: 'DynamoDB table name'
    Value: !Ref SeenTxTable
  ScheduleRuleArn:
    Description: 'EventBridge rule ARN'
    Value: !GetAtt ScheduleRule.Arn
